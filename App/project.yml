name: MahoNotes
options:
  bundleIdPrefix: com.pcca
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  localizations:
  - en
  - zh-Hant
  - ja
  - ko
  - fr
  - it
  - es

packages:
  MahoNotesPackage:
    path: ..

targets:
  MahoNotes:
    type: application
    platform: [macOS, iOS]
    sources:
      - MahoNotes
    resources:
      - path: MahoNotes/Resources/highlight
        buildPhase: resources
      - path: MahoNotes/Resources/katex
        buildPhase: resources
      - path: MahoNotes/Resources/mermaid
        buildPhase: resources
      - path: MahoNotes/Resources/GettingStarted.bundle
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pcca.mahonotes
        PRODUCT_NAME: Maho Notes
        MARKETING_VERSION: "0.6.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_CFBundleDisplayName: Maho Notes
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        CODE_SIGN_ENTITLEMENTS: MahoNotes/MahoNotes.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: MahoNotes/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: K867NAPA93
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    dependencies:
      - package: MahoNotesPackage
        product: MahoNotesKit
    # Entitlements are platform-specific files:
    #   MahoNotes_macOS.entitlements — includes sandbox + file access
    #   MahoNotes_iOS.entitlements   — iCloud + app groups only
    attributes:
      SystemCapabilities:
        com.apple.iCloud:
          enabled: true
    scheme:
      storeKitConfiguration: MahoNotes/Products.storekit

  MahoNotesTests:
    type: bundle.unit-test
    platform: [macOS, iOS]
    sources:
      - MahoNotesTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pcca.mahonotes.tests
        PRODUCT_NAME: MahoNotesTests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Maho Notes.app/Contents/MacOS/Maho Notes"
        BUNDLE_LOADER: "$(TEST_HOST)"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - target: MahoNotes_${platform}
